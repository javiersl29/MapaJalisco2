<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEMADET Jalisco - Visor SIG</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="map">
    <div class="topbar">
      <div class="topbar-brand">
        <img src="/img/semadet-logo.png" alt="SEMADET" class="logo" onerror="this.style.display='none'" />
        <h1>SEMADET Jalisco <span class="subtitle">Visor SIG</span></h1>
      </div>
      <div class="actions">
        <a href="/admin" class="btn-topbar">Panel Admin</a>
        <button id="gmapsBtn" class="btn-topbar" title="Abrir ubicacion en Google Maps">Maps</button>
        <button id="fsBtn" class="btn-topbar" title="Pantalla completa">Pantalla Completa</button>
        <button id="refreshBtn" class="btn-topbar">Refrescar</button>
      </div>
    </div>

    <aside class="sidebar">
      <header>
        <h2>Capas</h2>
        <span id="layerCount" style="font-size:12px;color:#64748b"></span>
      </header>
      <div class="body" id="layerList">
        <div class="section-header">Mapa Base</div>
        <div class="basemap-switcher">
          <label><input type="radio" name="basemap" value="hybrid" checked> Google Hibrido</label>
          <label><input type="radio" name="basemap" value="roads"> Google Mapas</label>
        </div>

        <div class="section-header">Capas SIG</div>
        <div class="layer-item sig-item">
          <input type="checkbox" id="sig-anps" checked />
          <div style="flex:1">
            <div class="name"><span class="sig-dot" style="background:#22c55e"></span> ANPS</div>
            <div class="sig-opacity">
              <input type="range" min="0" max="100" value="50" id="sig-anps-op" />
              <span class="sig-val" id="sig-anps-val">50%</span>
            </div>
          </div>
        </div>
        <div class="layer-item sig-item">
          <input type="checkbox" id="sig-mun" checked />
          <div style="flex:1">
            <div class="name"><span class="sig-dot" style="background:transparent;border:2px solid #2563eb"></span> Municipios</div>
            <div class="sig-opacity">
              <input type="range" min="0" max="100" value="80" id="sig-mun-op" />
              <span class="sig-val" id="sig-mun-val">80%</span>
            </div>
          </div>
        </div>

        <div class="section-header">Capas del Sistema</div>
        <div id="dbLayers"></div>
      </div>
    </aside>

    <div class="zoom-info"><span id="zoomLevel">--</span> | <span id="centerInfo">--</span></div>

    <div class="map-toolbar">
      <button id="toggleSidebar" title="Mostrar / ocultar capas">&#9776;</button>
      <button id="toolDistance" title="Medir distancia">&#128207;</button>
      <button id="toolArea" title="Medir superficie">&#128208;</button>
      <button id="toolLocate" title="Mi ubicacion">&#128205;</button>
    </div>

    <div class="measure-info" id="measureInfo" style="display:none;">
      <span class="measure-text"></span>
      <button id="measureClear" title="Limpiar">&#10005;</button>
    </div>
  </div>

  <div class="modal-backdrop" id="layerModal">
    <div class="modal">
      <header>
        <h3 id="layerModalTitle">Capa</h3>
        <button class="close" data-close>&times;</button>
      </header>
      <div class="body" id="layerModalBody"></div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/visor.js"></script>
</body>
</html>
